name: PlaceNotes
options:
  bundleIdPrefix: com.placenotes
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"

targets:
  PlaceNotes:
    type: application
    platform: iOS
    sources:
      - PlaceNotes
    settings:
      base:
        INFOPLIST_FILE: PlaceNotes/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.placenotes.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: PlaceNotes/PlaceNotes.entitlements
    entitlements:
      path: PlaceNotes/PlaceNotes.entitlements
