name: PlaceNotes
options:
  bundleIdPrefix: com.placenotes
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"
    DEVELOPMENT_TEAM: H63486AZ9Y
    CODE_SIGN_STYLE: Automatic

schemes:
  PlaceNotes:
    build:
      targets:
        PlaceNotes: all
        PlaceNotesTests: [test]
    test:
      targets:
        - PlaceNotesTests
    run:
      config: Debug

targets:
  PlaceNotes:
    type: application
    platform: iOS
    sources:
      - PlaceNotes
    settings:
      base:
        INFOPLIST_FILE: PlaceNotes/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.placenotes.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: PlaceNotes/PlaceNotes.entitlements
    entitlements:
      path: PlaceNotes/PlaceNotes.entitlements

  PlaceNotesTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - PlaceNotesTests
    dependencies:
      - target: PlaceNotes
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.placenotes.tests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/PlaceNotes.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/PlaceNotes"
        BUNDLE_LOADER: "$(TEST_HOST)"
